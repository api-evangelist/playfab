  - https://learn.microsoft.com/en-us/gaming/playfab/data-analytics/acting-data/action-rules-overview
  - https://learn.microsoft.com/en-us/gaming/playfab/data-analytics/acting-data/action-rules-quickstart
  - https://learn.microsoft.com/en-us/gaming/playfab/data-analytics/export-data/data-connection-overview
  - https://learn.microsoft.com/en-us/gaming/playfab/data-analytics/ingest-data/playstream-overview
  - https://learn.microsoft.com/en-us/rest/api/playfab/admin/play-stream
  - https://learn.microsoft.com/en-us/rest/api/playfab/admin/
